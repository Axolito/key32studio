  h += "s+=\"<div class='key-body'><div class='key-row'>\";";
  h += "s+=\"<div class='field'><label>Page</label><input type='number' id='k\"+i+\"_page' value='\"+k.page+\"' min='1' max='99' oninput='refreshPreviews()'></div>\";";
  h += "s+=\"<div class='field'><label>Row</label><input type='number' id='k\"+i+\"_row' value='\"+k.row+\"' min='0' max='7' oninput='refreshPreviews()'></div>\";";
  h += "s+=\"<div class='field'><label>Col</label><input type='number' id='k\"+i+\"_col' value='\"+k.col+\"' min='0' max='7' oninput='refreshPreviews()'></div>\";";
  h += "s+=\"</div><div class='url-preview' id='k\"+i+\"_preview'></div>\";";
  h += "s+=\"<div class='btn-row'><button class='btn-test' onclick='testKey(\"+i+\")'>&#9654; TEST PRESS</button></div>\";";
  h += "s+=\"</div></div>\";";
  h += "c.innerHTML+=s;});refreshPreviews();}";

  h += "function loadConfig(){";
  h += "fetch('/api/config').then(function(r){return r.json();}).then(function(d){";
  h += "document.getElementById('wifi_ssid').value=d.wifi_ssid||'';";
  h += "document.getElementById('wifi_password').value='';";
  h += "document.getElementById('companion_ip').value=d.companion_ip||'';";
  h += "document.getElementById('companion_port').value=d.companion_port||8888;";
  h += "buildKeyCards(d);showToast('Config chargee',true);";
  h += "}).catch(function(){showToast('Erreur chargement',false);});}";

  h += "function saveConfig(){";
  h += "var keys=cfg.keys.map(function(_,i){return{";
  h += "label:document.getElementById('k'+i+'_label').value,";
  h += "page:+document.getElementById('k'+i+'_page').value,";
  h += "row:+document.getElementById('k'+i+'_row').value,";
  h += "col:+document.getElementById('k'+i+'_col').value,";
  h += "enabled:document.getElementById('k'+i+'_enabled').checked};});";
  h += "var p={wifi_ssid:document.getElementById('wifi_ssid').value,";
  h += "wifi_password:document.getElementById('wifi_password').value,";
  h += "companion_ip:document.getElementById('companion_ip').value,";
  h += "companion_port:+document.getElementById('companion_port').value,keys:keys};";
  h += "fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})";
  h += ".then(function(r){return r.json();}).then(function(d){";
  h += "showToast(d.status==='ok'?'Sauvegarde OK':'Erreur serveur',d.status==='ok');})";
  h += ".catch(function(){showToast('Erreur reseau',false);});}";

  h += "function testKey(idx){";
  h += "fetch('/api/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:idx})})";
  h += ".then(function(){showToast('Key '+(idx+1)+' - press envoye',true);})";
  h += ".catch(function(){showToast('Erreur test',false);});}";

  h += "function reboot(){";
  h += "if(!confirm('Redemarrer l ESP32 ?'))return;";
  h += "fetch('/api/reboot',{method:'POST'});showToast('Redemarrage...',true);}";

  h += "function showToast(msg,ok){";
  h += "var t=document.getElementById('toast');";
  h += "t.textContent=msg;t.className='toast '+(ok?'ok':'err');t.style.display='block';";
  h += "clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},3000);}";

  h += "loadConfig();";
  h += "</script></body></html>";

  return h;
}
